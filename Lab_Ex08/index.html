<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="description" content="">
    <title>Leaf Project</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- Custom styling -->
    <link rel="stylesheet" href="css/style.css">

<body>
    <nav class="navbar navbar-default">
        <div class="container">
            <a class="navbar-brand" href="#"><img id="logo" src="img/logo.png"></a>      
        </div>
    </nav>

    <!-- Bootstrap grid setup -->
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <button id="play-button" class="btn btn-primary">Pause</button>
                <button id="reset-button" class="btn btn-primary">Reset</button>

                <span id="year-text" style="margin-left: 15px;">Year: 1800</span>
                <div id="date-slider" style="width: 300px; display: inline-block; margin-left: 15px;"></div>

                <select id="continent-select" style="float:right;">
                 <option value="all">All</option>
                 <option value="Africa">Africa</option>
                 <option value="Americas">Americas</option>
                 <option value="Asia">Asia</option>
                 <option value="Europe">Europe</option>
                </select>
            </div>
        </div>
            <div id="chart-area"></div>  
        </div>
    </div>

<!-- External JS libraries -->
